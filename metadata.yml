Identifier: eos7dg4
Slug: ntd-rule
Status: In progress
Title: NTD chemistry rules
Description: The NTD Rule defined in Brenk et al, 2008 identifies 105 chemical 
  substructures that are typically present in drugs targeting Neglected Tropical
  Disease (NTDs). A condensed calculation of the NTD Rules as a single score is 
  available in the ChemFH package (eos7ye0). This model here identifies with a 0
  or 1 the absence/presence of each of the 105 chemical substructures.
