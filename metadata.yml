Identifier: eos7dg4
Slug: ntd-rule
Status: In progress
Title: NTD chemistry rules
Description: The NTD Rule from Brenk et al. (2008) screens molecules against 105
  SMARTS patterns representing unwanted functionalities identified when assembling
  screening libraries for neglected tropical disease drug discovery. These include
  reactive groups (aldehydes, acid halides, Michael acceptors), potentially toxic
  groups (nitro compounds, heavy metals, polyhalogenated rings), assay-interfering
  groups (catechols, quinones) and groups with poor ADME properties (long aliphatic
  chains, perfluorinated chains). The model returns a binary flag for each of the
  105 substructures and the total count of matched substructures (n_hits).
